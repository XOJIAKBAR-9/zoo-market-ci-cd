<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoo Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Welcome to the Zoo Store 🐾</h1>
    <nav>
      <button id="filter-all" aria-label="Show all pets">All</button>
      <button id="filter-cats" aria-label="Show only cats">Cats 🐈</button>
      <button id="filter-dogs" aria-label="Show only dogs">Dogs 🐕</button>
    </nav>
  </header>

  <main>
    <div class="grid" id="pet-grid">
      </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
